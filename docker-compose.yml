services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    volumes:
      - .:/var/www/html
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "composer install --no-interaction && php artisan serve --host=0.0.0.0 --port=8000"

  vite:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    volumes:
      - .:/var/www/html
      - vite-node-modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblia
      MYSQL_USER: biblia
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - biblia-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - biblia-redis-data:/data

  phpmyadmin:
    image: phpmyadmin:5
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql

volumes:
  biblia-mysql-data:
  biblia-redis-data:
  vite-node-modules:
